<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Pogoda Opatówek — Galaxy A02s</title>
  <meta name="color-scheme" content="dark" />
  <style>
    :root {
      --bg: #091018;
      --text: #edf4fb;
      --muted: #9fb0c1;
      --accent-2: #8df2ca;
      --border: rgba(255,255,255,.08);
      --shadow: 0 18px 50px rgba(0,0,0,.32);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top left, #152335 0%, #0b121b 45%, #06090d 100%);
      color: var(--text);
      font-family: Inter, Roboto, Arial, sans-serif;
    }
    body { position: fixed; inset: 0; }

    .viewport {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 0;
    }

    /* Projekt bazowy pod Galaxy A02s w poziomie: 1600x720 */
    .stage {
      width: 1600px;
      height: 720px;
      transform-origin: top left;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
      padding: 14px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      min-height: 0;
    }

    .main {
      display: grid;
      grid-template-columns: 1.2fr .96fr;
      gap: 14px;
      min-height: 0;
    }

    .hero {
      padding: 22px;
      display: grid;
      align-content: space-between;
      gap: 14px;
      min-height: 0;
    }

    .clockRow {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 18px;
      align-items: start;
      min-height: 0;
    }

    .clockWrap { min-width: 0; }
    .clock {
      font-size: 142px;
      line-height: .88;
      font-weight: 900;
      letter-spacing: -4px;
      white-space: nowrap;
    }
    .date {
      margin-top: 10px;
      font-size: 28px;
      color: var(--muted);
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .infoCol {
      display: grid;
      align-content: center;
      gap: 10px;
      padding-top: 10px;
      min-width: 0;
    }
    .place {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.08;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status {
      font-size: 18px;
      color: var(--muted);
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      white-space: nowrap;
      font-size: 15px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 16px var(--accent-2);
    }

    .currentRow {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
      min-height: 0;
    }
    .weatherIcon { font-size: 88px; }
    .tempWrap { display: grid; gap: 6px; min-width: 0; }
    .temp {
      font-size: 86px;
      line-height: .92;
      font-weight: 900;
      white-space: nowrap;
    }
    .desc {
      font-size: 31px;
      line-height: 1.08;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      font-size: 20px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .forecast {
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      min-height: 0;
    }
    .sectionTitle {
      font-size: 15px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 0 4px;
    }
    .hours {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      min-height: 0;
    }
    .hourCard {
      background: linear-gradient(180deg, rgba(91,180,255,.11), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px;
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .hourTime { font-size: 21px; font-weight: 700; color: var(--muted); }
    .hourIcon { font-size: 30px; }
    .hourMid { display: grid; gap: 4px; min-width: 0; }
    .hourDesc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hourTemp { font-size: 31px; font-weight: 900; text-align: right; white-space: nowrap; }
    .hourRain { font-size: 13px; color: var(--accent-2); text-align: right; white-space: nowrap; }

    .footer {
      padding: 0 4px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    @media (max-aspect-ratio: 1/1) {
      html, body { overflow: auto; }
      body { position: static; }
      .viewport { display: block; overflow: auto; }
      .stage {
        width: auto;
        height: auto;
        transform: none !important;
        grid-template-rows: auto auto;
      }
      .main { grid-template-columns: 1fr; }
      .clockRow { grid-template-columns: 1fr; }
      .hours { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <main class="stage" id="stage">
      <section class="main">
        <article class="card hero">
          <div class="clockRow">
            <div class="clockWrap">
              <div class="clock" id="clock">--:--</div>
              <div class="date" id="date">--</div>
            </div>
            <div class="infoCol">
              <div class="place">Opatówek, Wielkopolska</div>
              <div class="status" id="connectionStatus">Ładowanie danych pogodowych…</div>
              <div class="pill"><span class="dot"></span><span>Online</span></div>
            </div>
          </div>

          <div class="currentRow">
            <div class="weatherIcon" id="weatherIcon">☁️</div>
            <div class="tempWrap">
              <div class="temp" id="currentTemp">--°</div>
              <div class="desc" id="weatherDesc">Pobieranie…</div>
              <div class="meta" id="feelsLike">Odczuwalna: --°</div>
            </div>
          </div>
        </article>

        <article class="card forecast">
          <div class="sectionTitle">Najbliższe 6 godzin</div>
          <div class="hours" id="hourlyContainer"></div>
        </article>
      </section>

      <footer class="footer">
        <div id="updatedAt">Aktualizacja: --</div>
        <div>Źródło: Open-Meteo</div>
      </footer>
    </main>
  </div>

  <script>
    const LAT = 51.739722;
    const LON = 18.214167;
    const TZ = 'Europe/Warsaw';
    const BASE_W = 1600;
    const BASE_H = 720;

    const weatherMap = {
      0: ['Bezchmurnie', '☀️'], 1: ['Przeważnie słonecznie', '🌤️'], 2: ['Częściowe zachmurzenie', '⛅'], 3: ['Pochmurno', '☁️'],
      45: ['Mgła', '🌫️'], 48: ['Marznąca mgła', '🌫️'], 51: ['Lekka mżawka', '🌦️'], 53: ['Mżawka', '🌦️'], 55: ['Gęsta mżawka', '🌧️'],
      56: ['Lekka marznąca mżawka', '🌧️'], 57: ['Marznąca mżawka', '🌧️'], 61: ['Słaby deszcz', '🌦️'], 63: ['Deszcz', '🌧️'], 65: ['Ulewa', '🌧️'],
      66: ['Lekki marznący deszcz', '🌧️'], 67: ['Marznący deszcz', '🌧️'], 71: ['Słaby śnieg', '🌨️'], 73: ['Śnieg', '🌨️'], 75: ['Intensywny śnieg', '❄️'],
      77: ['Ziarna śnieżne', '🌨️'], 80: ['Przelotne opady', '🌦️'], 81: ['Przelotny deszcz', '🌧️'], 82: ['Silne przelotne opady', '⛈️'],
      85: ['Przelotny śnieg', '🌨️'], 86: ['Silny przelotny śnieg', '❄️'], 95: ['Burza', '⛈️'], 96: ['Burza z gradem', '⛈️'], 99: ['Silna burza z gradem', '⛈️']
    };

    const pad = n => String(n).padStart(2, '0');

    function fitStage() {
      if (window.matchMedia('(max-aspect-ratio: 1/1)').matches) return;
      const stage = document.getElementById('stage');
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scale = Math.min(vw / BASE_W, vh / BASE_H);
      stage.style.transform = `scale(${scale})`;
      stage.style.width = BASE_W + 'px';
      stage.style.height = BASE_H + 'px';
      stage.parentElement.style.placeItems = 'start';
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      document.getElementById('date').textContent = now.toLocaleDateString('pl-PL', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function fmtHour(ts) {
      const d = new Date(ts);
      return `${pad(d.getHours())}:00`;
    }

    function renderHourly(times, temps, codes, rain) {
      const now = new Date();
      const upcoming = [];
      for (let i = 0; i < times.length; i++) {
        const t = new Date(times[i]);
        if (t >= now) upcoming.push({ time: times[i], temp: temps[i], code: codes[i], rain: rain[i] });
        if (upcoming.length === 6) break;
      }
      document.getElementById('hourlyContainer').innerHTML = upcoming.map(item => {
        const [desc, icon] = weatherMap[item.code] || ['Warunki nieznane', '❔'];
        const rainText = Number.isFinite(item.rain) ? `${Math.round(item.rain)}% opadów` : 'Brak danych';
        return `<article class="hourCard">
          <div class="hourIcon">${icon}</div>
          <div class="hourMid"><div class="hourTime">${fmtHour(item.time)}</div><div class="hourDesc">${desc}</div></div>
          <div><div class="hourTemp">${Math.round(item.temp)}°</div><div class="hourRain">${rainText}</div></div>
        </article>`;
      }).join('');
    }

    async function loadWeather() {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + LAT + '&longitude=' + LON + '&current=temperature_2m,apparent_temperature,weather_code&hourly=temperature_2m,weather_code,precipitation_probability&forecast_days=2&timezone=' + encodeURIComponent(TZ);
      try {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const current = data.current || {};
        const [desc, icon] = weatherMap[current.weather_code] || ['Warunki nieznane', '❔'];
        document.getElementById('currentTemp').textContent = `${Math.round(current.temperature_2m)}°`;
        document.getElementById('weatherDesc').textContent = desc;
        document.getElementById('weatherIcon').textContent = icon;
        document.getElementById('feelsLike').textContent = `Odczuwalna: ${Math.round(current.apparent_temperature)}°`;
        renderHourly(data.hourly.time, data.hourly.temperature_2m, data.hourly.weather_code, data.hourly.precipitation_probability);
        document.getElementById('updatedAt').textContent = 'Aktualizacja: ' + new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('connectionStatus').textContent = 'Dane odświeżają się co 30 minut';
      } catch (err) {
        document.getElementById('connectionStatus').textContent = 'Nie udało się pobrać pogody';
        document.getElementById('hourlyContainer').innerHTML = '<div style="padding:18px;color:#ffb4b4;">Brak danych pogodowych. Sprawdź internet albo odśwież stronę.</div>';
      }
    }

    window.addEventListener('resize', fitStage);
    window.addEventListener('orientationchange', fitStage);
    fitStage();
    updateClock();
    setInterval(updateClock, 1000);
    loadWeather();
    setInterval(loadWeather, 30 * 60 * 1000);
  </script>
</body>
</html>
