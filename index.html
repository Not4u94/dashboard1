<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pogoda Opatówek — animowana ikona</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root {
      --bg-grad-1: #152335;
      --bg-grad-2: #0b121b;
      --bg-grad-3: #06090d;
      --text: #edf4fb;
      --muted: #9fb0c1;
      --accent: #5bb4ff;
      --accent-2: #8df2ca;
      --border: rgba(255,255,255,.08);
      --shadow: 0 22px 70px rgba(0,0,0,.35);
      --radius: 26px;
      --card-bg-1: rgba(255,255,255,.045);
      --card-bg-2: rgba(255,255,255,.02);
      --hour-bg-1: rgba(91,180,255,.11);
      --hour-bg-2: rgba(255,255,255,.03);
      --sun: #ffd55c;
      --cloud: #eef5ff;
      --rain: #65c2ff;
      --snow: #ffffff;
      --storm: #ffd35a;
      --fog: #dbe5ef;
    }
    body.theme-light {
      --bg-grad-1: #dcecff;
      --bg-grad-2: #eff5fb;
      --bg-grad-3: #d7e5f6;
      --text: #132235;
      --muted: #5b7086;
      --accent: #1b77da;
      --accent-2: #178f67;
      --border: rgba(19,34,53,.12);
      --shadow: 0 18px 45px rgba(35,72,120,.12);
      --card-bg-1: rgba(255,255,255,.72);
      --card-bg-2: rgba(255,255,255,.48);
      --hour-bg-1: rgba(27,119,218,.10);
      --hour-bg-2: rgba(255,255,255,.55);
      --sun: #ffbd2e;
      --cloud: #ffffff;
      --rain: #2492ff;
      --snow: #ffffff;
      --storm: #ffb400;
      --fog: #d0dae4;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      background: radial-gradient(circle at top left, var(--bg-grad-1) 0%, var(--bg-grad-2) 45%, var(--bg-grad-3) 100%);
      color: var(--text);
      font-family: Inter, Roboto, Arial, sans-serif;
      transition: background 400ms ease, color 250ms ease;
    }
    body { min-height: 100vh; }
    .app {
      min-height: 100vh;
      padding: 16px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
    }
    .card {
      background: linear-gradient(180deg, var(--card-bg-1), var(--card-bg-2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: background 250ms ease, border-color 250ms ease, box-shadow 250ms ease;
    }
    .main {
      display: grid;
      grid-template-columns: 1.25fr .9fr;
      gap: 14px;
      min-height: 0;
    }
    .hero {
      padding: 24px;
      display: grid;
      align-content: space-between;
      min-height: 0;
    }
    .clock { font-size: clamp(86px, 12vw, 150px); line-height: .9; font-weight: 900; letter-spacing: -3px; }
    .date { margin-top: 10px; font-size: clamp(20px, 2.2vw, 30px); color: var(--muted); }
    .currentRow {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
      justify-content: start;
      margin-top: 16px;
    }
    .weatherIcon {
      width: clamp(106px, 11vw, 150px);
      height: clamp(106px, 11vw, 150px);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .weatherIcon svg { width: 100%; height: 100%; overflow: visible; }
    .tempWrap { display: grid; gap: 6px; }
    .temp { font-size: clamp(56px, 6vw, 88px); line-height: .95; font-weight: 900; }
    .desc { font-size: clamp(22px, 2.2vw, 30px); }
    .meta { font-size: 16px; color: var(--muted); }
    .forecast {
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-height: 0;
    }
    .sectionTitle {
      font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.4px;
      padding: 0 4px;
    }
    .hours {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      min-height: 0;
    }
    .hourCard {
      background: linear-gradient(180deg, var(--hour-bg-1), var(--hour-bg-2));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      transition: background 250ms ease, border-color 250ms ease;
    }
    .hourTime { font-size: 20px; font-weight: 700; color: var(--muted); }
    .hourIcon { font-size: 30px; }
    .hourMid { display: grid; gap: 4px; }
    .hourDesc { font-size: 14px; color: var(--muted); }
    .hourTemp { font-size: 30px; font-weight: 900; text-align: right; }
    .hourRain { font-size: 13px; color: var(--accent-2); text-align: right; }
    .footer {
      padding: 0 6px 2px;
      display: flex; justify-content: space-between; gap: 10px;
      font-size: 13px; color: var(--muted);
    }

    .anim-spin { animation: spin 18s linear infinite; transform-origin: 50% 50%; }
    .anim-float-a { animation: floatA 3.8s ease-in-out infinite; }
    .anim-float-b { animation: floatB 4.8s ease-in-out infinite; }
    .anim-rain { animation: rain 1.25s linear infinite; }
    .anim-rain-2 { animation: rain 1.25s linear infinite .35s; }
    .anim-snow { animation: snow 2.2s linear infinite; }
    .anim-snow-2 { animation: snow 2.2s linear infinite .8s; }
    .anim-flash { animation: flash 2.6s ease-in-out infinite; }
    .anim-fog { animation: fog 4s ease-in-out infinite; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes floatA { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
    @keyframes floatB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(4px,-3px); } }
    @keyframes rain { 0% { transform: translateY(-2px); opacity: 0; } 25% { opacity: 1; } 100% { transform: translateY(18px); opacity: 0; } }
    @keyframes snow { 0% { transform: translate(0,-2px); opacity: 0; } 25% { opacity: 1; } 100% { transform: translate(8px,16px); opacity: 0; } }
    @keyframes flash { 0%, 42%, 100% { opacity: .12; } 46% { opacity: 1; } 50% { opacity: .2; } 54% { opacity: .9; } }
    @keyframes fog { 0%,100% { transform: translateX(0); opacity: .7; } 50% { transform: translateX(8px); opacity: 1; } }

    @media (orientation: portrait), (max-width: 900px) {
      .app { grid-template-rows: auto auto auto; }
      .main { grid-template-columns: 1fr; }
      .hours { grid-template-columns: repeat(3, 1fr); }
      .hourCard { grid-template-columns: 1fr; text-align: center; }
      .hourTemp, .hourRain { text-align: center; }
      .hero { gap: 14px; }
    }
    @media (max-width: 620px) {
      .app { padding: 12px; gap: 12px; }
      .hero, .forecast { padding: 16px; }
      .hours { grid-template-columns: repeat(2, 1fr); }
      .currentRow { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="theme-dark">
  <main class="app">
    <section class="main">
      <article class="card hero">
        <div>
          <div class="clock" id="clock">--:--</div>
          <div class="date" id="date">--</div>
        </div>
        <div class="currentRow">
          <div class="weatherIcon" id="weatherIcon"></div>
          <div class="tempWrap">
            <div class="temp" id="currentTemp">--°</div>
            <div class="desc" id="weatherDesc">Pobieranie…</div>
            <div class="meta" id="feelsLike">Odczuwalna: --°</div>
          </div>
        </div>
      </article>

      <article class="card forecast">
        <div class="sectionTitle">Najbliższe 6 godzin</div>
        <div class="hours" id="hourlyContainer"></div>
      </article>
    </section>

    <footer class="footer">
      <div id="updatedAt">Aktualizacja: --</div>
      <div id="themeInfo">Motyw: nocny</div>
    </footer>
  </main>

  <script>
    const LAT = 51.739722;
    const LON = 18.214167;
    const TZ = 'Europe/Warsaw';
    let sunriseToday = null;
    let sunsetToday = null;

    const weatherMap = {
      0: ['Bezchmurnie', '☀️'], 1: ['Przeważnie słonecznie', '🌤️'], 2: ['Częściowe zachmurzenie', '⛅'], 3: ['Pochmurno', '☁️'],
      45: ['Mgła', '🌫️'], 48: ['Marznąca mgła', '🌫️'], 51: ['Lekka mżawka', '🌦️'], 53: ['Mżawka', '🌦️'], 55: ['Gęsta mżawka', '🌧️'],
      56: ['Lekka marznąca mżawka', '🌧️'], 57: ['Marznąca mżawka', '🌧️'], 61: ['Słaby deszcz', '🌦️'], 63: ['Deszcz', '🌧️'], 65: ['Ulewa', '🌧️'],
      66: ['Lekki marznący deszcz', '🌧️'], 67: ['Marznący deszcz', '🌧️'], 71: ['Słaby śnieg', '🌨️'], 73: ['Śnieg', '🌨️'], 75: ['Intensywny śnieg', '❄️'],
      77: ['Ziarna śnieżne', '🌨️'], 80: ['Przelotne opady', '🌦️'], 81: ['Przelotny deszcz', '🌧️'], 82: ['Silne przelotne opady', '⛈️'],
      85: ['Przelotny śnieg', '🌨️'], 86: ['Silny przelotny śnieg', '❄️'], 95: ['Burza', '⛈️'], 96: ['Burza z gradem', '⛈️'], 99: ['Silna burza z gradem', '⛈️']
    };

    const pad = n => String(n).padStart(2, '0');

    function iconSVG(type) {
      const common = 'stroke="none"';
      const sun = `
        <svg viewBox="0 0 128 128" aria-hidden="true">
          <g class="anim-spin" opacity=".95">
            ${Array.from({length: 8}).map((_,i)=>{
              const angle=i*45*Math.PI/180; const x1=64+Math.cos(angle)*30; const y1=64+Math.sin(angle)*30; const x2=64+Math.cos(angle)*44; const y2=64+Math.sin(angle)*44;
              return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--sun)" stroke-width="6" stroke-linecap="round" />`;
            }).join('')}
          </g>
          <circle cx="64" cy="64" r="22" fill="var(--sun)" />
        </svg>`;
      const cloud = `
        <svg viewBox="0 0 128 128" aria-hidden="true">
          <g class="anim-float-a">
            <circle cx="54" cy="68" r="20" fill="var(--cloud)" />
            <circle cx="74" cy="62" r="24" fill="var(--cloud)" />
            <circle cx="92" cy="72" r="18" fill="var(--cloud)" />
            <rect x="36" y="72" width="74" height="18" rx="9" fill="var(--cloud)" />
          </g>
        </svg>`;
      const partly = `
        <svg viewBox="0 0 128 128" aria-hidden="true">
          <g class="anim-spin" opacity=".9">
            ${Array.from({length: 8}).map((_,i)=>{
              const angle=i*45*Math.PI/180; const x1=42+Math.cos(angle)*18; const y1=38+Math.sin(angle)*18; const x2=42+Math.cos(angle)*28; const y2=38+Math.sin(angle)*28;
              return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--sun)" stroke-width="5" stroke-linecap="round" />`;
            }).join('')}
          </g>
          <circle cx="42" cy="38" r="14" fill="var(--sun)" />
          <g class="anim-float-b">
            <circle cx="54" cy="72" r="18" fill="var(--cloud)" />
            <circle cx="74" cy="66" r="22" fill="var(--cloud)" />
            <circle cx="92" cy="76" r="16" fill="var(--cloud)" />
            <rect x="38" y="76" width="70" height="16" rx="8" fill="var(--cloud)" />
          </g>
        </svg>`;
      const rain = `
        <svg viewBox="0 0 128 128" aria-hidden="true">
          <g class="anim-float-a">
            <circle cx="54" cy="54" r="18" fill="var(--cloud)" />
            <circle cx="74" cy="48" r="22" fill="var(--cloud)" />
            <circle cx="92" cy="58" r="16" fill="var(--cloud)" />
            <rect x="38" y="58" width="70" height="16" rx="8" fill="var(--cloud)" />
          </g>
          <g>
            <line class="anim-rain" x1="54" y1="78" x2="48" y2="96" stroke="var(--rain)" stroke-width="5" stroke-linecap="round" />
            <line class="anim-rain-2" x1="72" y1="78" x2="66" y2="96" stroke="var(--rain)" stroke-width="5" stroke-linecap="round" />
            <line class="anim-rain" x1="90" y1="78" x2="84" y2="96" stroke="var(--rain)" stroke-width="5" stroke-linecap="round" />
          </g>
        </svg>`;
      const snow = `
        <svg viewBox="0 0 128 128" aria-hidden="true">
          <g class="anim-float-a">
            <circle cx="54" cy="54" r="18" fill="var(--cloud)" />
            <circle cx="74" cy="48" r="22" fill="var(--cloud)" />
            <circle cx="92" cy="58" r="16" fill="var(--cloud)" />
            <rect x="38" y="58" width="70" height="16" rx="8" fill="var(--cloud)" />
          </g>
          <g>
            <circle class="anim-snow" cx="56" cy="84" r="4" fill="var(--snow)" />
            <circle class="anim-snow-2" cx="74" cy="84" r="4" fill="var(--snow)" />
            <circle class="anim-snow" cx="92" cy="84" r="4" fill="var(--snow)" />
          </g>
        </svg>`;
      const storm = `
        <svg viewBox="0 0 128 128" aria-hidden="true">
          <g class="anim-float-a">
            <circle cx="54" cy="54" r="18" fill="var(--cloud)" />
            <circle cx="74" cy="48" r="22" fill="var(--cloud)" />
            <circle cx="92" cy="58" r="16" fill="var(--cloud)" />
            <rect x="38" y="58" width="70" height="16" rx="8" fill="var(--cloud)" />
          </g>
          <polygon class="anim-flash" points="72,76 58,100 72,100 64,118 92,88 76,88 84,76" fill="var(--storm)" />
        </svg>`;
      const fog = `
        <svg viewBox="0 0 128 128" aria-hidden="true">
          <g class="anim-float-a" opacity=".95">
            <circle cx="54" cy="46" r="16" fill="var(--cloud)" />
            <circle cx="74" cy="42" r="20" fill="var(--cloud)" />
            <circle cx="90" cy="50" r="14" fill="var(--cloud)" />
            <rect x="40" y="50" width="64" height="14" rx="7" fill="var(--cloud)" />
          </g>
          <g class="anim-fog" stroke="var(--fog)" stroke-width="6" stroke-linecap="round" fill="none" opacity=".95">
            <path d="M28 76 H102" />
            <path d="M22 90 H96" />
            <path d="M34 104 H108" />
          </g>
        </svg>`;
      return {sun, cloud, partly, rain, snow, storm, fog}[type] || cloud;
    }

    function iconTypeFromCode(code) {
      if (code === 0) return 'sun';
      if (code === 1 || code === 2) return 'partly';
      if (code === 3) return 'cloud';
      if (code === 45 || code === 48) return 'fog';
      if ([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return 'rain';
      if ([71,73,75,77,85,86].includes(code)) return 'snow';
      if ([95,96,99].includes(code)) return 'storm';
      return 'cloud';
    }

    function applyThemeBySun() {
      if (!sunriseToday || !sunsetToday) return;
      const now = new Date();
      const isDay = now >= sunriseToday && now < sunsetToday;
      document.body.classList.toggle('theme-light', isDay);
      document.body.classList.toggle('theme-dark', !isDay);
      document.getElementById('themeInfo').textContent = isDay ? 'Motyw: dzienny' : 'Motyw: nocny';
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      document.getElementById('date').textContent = now.toLocaleDateString('pl-PL', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function fmtHour(ts) {
      const d = new Date(ts);
      return `${pad(d.getHours())}:00`;
    }

    function renderAnimatedIcon(code) {
      document.getElementById('weatherIcon').innerHTML = iconSVG(iconTypeFromCode(code));
    }

    function renderHourly(times, temps, codes, rain) {
      const now = new Date();
      const upcoming = [];
      for (let i = 0; i < times.length; i++) {
        const t = new Date(times[i]);
        if (t >= now) upcoming.push({ time: times[i], temp: temps[i], code: codes[i], rain: rain[i] });
        if (upcoming.length === 6) break;
      }
      document.getElementById('hourlyContainer').innerHTML = upcoming.map(item => {
        const [desc, icon] = weatherMap[item.code] || ['Warunki nieznane', '❔'];
        const rainText = Number.isFinite(item.rain) ? `${Math.round(item.rain)}% opadów` : 'Brak danych';
        return `<article class="hourCard">
          <div class="hourIcon">${icon}</div>
          <div class="hourMid"><div class="hourTime">${fmtHour(item.time)}</div><div class="hourDesc">${desc}</div></div>
          <div><div class="hourTemp">${Math.round(item.temp)}°</div><div class="hourRain">${rainText}</div></div>
        </article>`;
      }).join('');
    }

    async function loadWeather() {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + LAT + '&longitude=' + LON + '&current=temperature_2m,apparent_temperature,weather_code&hourly=temperature_2m,weather_code,precipitation_probability&daily=sunrise,sunset&forecast_days=2&timezone=' + encodeURIComponent(TZ);
      try {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const current = data.current || {};
        const [desc] = weatherMap[current.weather_code] || ['Warunki nieznane'];
        if (data.daily && data.daily.sunrise && data.daily.sunrise[0]) sunriseToday = new Date(data.daily.sunrise[0]);
        if (data.daily && data.daily.sunset && data.daily.sunset[0]) sunsetToday = new Date(data.daily.sunset[0]);
        applyThemeBySun();
        renderAnimatedIcon(current.weather_code);
        document.getElementById('currentTemp').textContent = `${Math.round(current.temperature_2m)}°`;
        document.getElementById('weatherDesc').textContent = desc;
        document.getElementById('feelsLike').textContent = `Odczuwalna: ${Math.round(current.apparent_temperature)}°`;
        renderHourly(data.hourly.time, data.hourly.temperature_2m, data.hourly.weather_code, data.hourly.precipitation_probability);
        document.getElementById('updatedAt').textContent = 'Aktualizacja: ' + new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
      } catch (err) {
        document.getElementById('weatherIcon').innerHTML = iconSVG('cloud');
        document.getElementById('hourlyContainer').innerHTML = '<div style="padding:18px;color:#ff7c7c;">Brak danych pogodowych. Sprawdź internet albo odśwież stronę.</div>';
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
    loadWeather();
    setInterval(loadWeather, 30 * 60 * 1000);
    setInterval(applyThemeBySun, 5 * 60 * 1000);
  </script>
</body>
</html>
