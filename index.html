<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pogoda Opatówek — poziomo</title>
  <meta name="color-scheme" content="dark" />
  <style>
    :root {
      --bg: #091018;
      --panel: #111925;
      --panel-2: #162131;
      --text: #edf4fb;
      --muted: #9fb0c1;
      --accent: #5bb4ff;
      --accent-2: #8df2ca;
      --border: rgba(255,255,255,.08);
      --shadow: 0 22px 70px rgba(0,0,0,.35);
      --radius: 26px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      background: radial-gradient(circle at top left, #152335 0%, #0b121b 45%, #06090d 100%);
      color: var(--text);
      font-family: Inter, Roboto, Arial, sans-serif;
    }
    body { min-height: 100vh; }
    .app {
      min-height: 100vh;
      padding: 16px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .main {
      display: grid;
      grid-template-columns: 1.25fr .9fr;
      gap: 14px;
      min-height: 0;
    }
    .hero {
      padding: 24px;
      display: grid;
      align-content: space-between;
      min-height: 0;
    }
    .clock { font-size: clamp(86px, 12vw, 150px); line-height: .9; font-weight: 900; letter-spacing: -3px; }
    .date { margin-top: 10px; font-size: clamp(20px, 2.2vw, 30px); color: var(--muted); }
    .currentRow {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
      justify-content: start;
      margin-top: 16px;
    }
    .weatherIcon { font-size: clamp(60px, 7vw, 92px); }
    .tempWrap { display: grid; gap: 6px; }
    .temp { font-size: clamp(56px, 6vw, 88px); line-height: .95; font-weight: 900; }
    .desc { font-size: clamp(22px, 2.2vw, 30px); }
    .meta { font-size: 16px; color: var(--muted); }
    .forecast {
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-height: 0;
    }
    .sectionTitle {
      font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.4px;
      padding: 0 4px;
    }
    .hours {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      min-height: 0;
    }
    .hourCard {
      background: linear-gradient(180deg, rgba(91,180,255,.11), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px;
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .hourTime { font-size: 20px; font-weight: 700; color: var(--muted); }
    .hourIcon { font-size: 30px; }
    .hourMid { display: grid; gap: 4px; }
    .hourDesc { font-size: 14px; color: var(--muted); }
    .hourTemp { font-size: 30px; font-weight: 900; text-align: right; }
    .hourRain { font-size: 13px; color: var(--accent-2); text-align: right; }
    .footer {
      padding: 0 6px 2px;
      display: flex; justify-content: space-between; gap: 10px;
      font-size: 13px; color: var(--muted);
    }
    @media (orientation: portrait), (max-width: 900px) {
      .app { grid-template-rows: auto auto auto; }
      .main { grid-template-columns: 1fr; }
      .hours { grid-template-columns: repeat(3, 1fr); }
      .hourCard {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .hourTemp, .hourRain { text-align: center; }
      .hero { gap: 14px; }
    }
    @media (max-width: 620px) {
      .app { padding: 12px; gap: 12px; }
      .hero, .forecast { padding: 16px; }
      .hours { grid-template-columns: repeat(2, 1fr); }
      .currentRow { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="main">
      <article class="card hero">
        <div>
          <div class="clock" id="clock">--:--</div>
          <div class="date" id="date">--</div>
        </div>
        <div class="currentRow">
          <div class="weatherIcon" id="weatherIcon">☁️</div>
          <div class="tempWrap">
            <div class="temp" id="currentTemp">--°</div>
            <div class="desc" id="weatherDesc">Pobieranie…</div>
            <div class="meta" id="feelsLike">Odczuwalna: --°</div>
          </div>
        </div>
      </article>

      <article class="card forecast">
        <div class="sectionTitle">Najbliższe 6 godzin</div>
        <div class="hours" id="hourlyContainer"></div>
      </article>
    </section>

    <footer class="footer">
      <div id="updatedAt">Aktualizacja: --</div>
      <div>Źródło: Open-Meteo</div>
    </footer>
  </main>

  <script>
    const LAT = 51.739722;
    const LON = 18.214167;
    const TZ = 'Europe/Warsaw';

    const weatherMap = {
      0: ['Bezchmurnie', '☀️'], 1: ['Przeważnie słonecznie', '🌤️'], 2: ['Częściowe zachmurzenie', '⛅'], 3: ['Pochmurno', '☁️'],
      45: ['Mgła', '🌫️'], 48: ['Marznąca mgła', '🌫️'], 51: ['Lekka mżawka', '🌦️'], 53: ['Mżawka', '🌦️'], 55: ['Gęsta mżawka', '🌧️'],
      56: ['Lekka marznąca mżawka', '🌧️'], 57: ['Marznąca mżawka', '🌧️'], 61: ['Słaby deszcz', '🌦️'], 63: ['Deszcz', '🌧️'], 65: ['Ulewa', '🌧️'],
      66: ['Lekki marznący deszcz', '🌧️'], 67: ['Marznący deszcz', '🌧️'], 71: ['Słaby śnieg', '🌨️'], 73: ['Śnieg', '🌨️'], 75: ['Intensywny śnieg', '❄️'],
      77: ['Ziarna śnieżne', '🌨️'], 80: ['Przelotne opady', '🌦️'], 81: ['Przelotny deszcz', '🌧️'], 82: ['Silne przelotne opady', '⛈️'],
      85: ['Przelotny śnieg', '🌨️'], 86: ['Silny przelotny śnieg', '❄️'], 95: ['Burza', '⛈️'], 96: ['Burza z gradem', '⛈️'], 99: ['Silna burza z gradem', '⛈️']
    };

    const pad = n => String(n).padStart(2, '0');
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      document.getElementById('date').textContent = now.toLocaleDateString('pl-PL', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function fmtHour(ts) {
      const d = new Date(ts);
      return `${pad(d.getHours())}:00`;
    }

    function renderHourly(times, temps, codes, rain) {
      const now = new Date();
      const upcoming = [];
      for (let i = 0; i < times.length; i++) {
        const t = new Date(times[i]);
        if (t >= now) upcoming.push({ time: times[i], temp: temps[i], code: codes[i], rain: rain[i] });
        if (upcoming.length === 6) break;
      }
      document.getElementById('hourlyContainer').innerHTML = upcoming.map(item => {
        const [desc, icon] = weatherMap[item.code] || ['Warunki nieznane', '❔'];
        const rainText = Number.isFinite(item.rain) ? `${Math.round(item.rain)}% opadów` : 'Brak danych';
        return `<article class="hourCard">
          <div class="hourIcon">${icon}</div>
          <div class="hourMid"><div class="hourTime">${fmtHour(item.time)}</div><div class="hourDesc">${desc}</div></div>
          <div><div class="hourTemp">${Math.round(item.temp)}°</div><div class="hourRain">${rainText}</div></div>
        </article>`;
      }).join('');
    }

    async function loadWeather() {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + LAT + '&longitude=' + LON + '&current=temperature_2m,apparent_temperature,weather_code&hourly=temperature_2m,weather_code,precipitation_probability&forecast_days=2&timezone=' + encodeURIComponent(TZ);
      try {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const current = data.current || {};
        const [desc, icon] = weatherMap[current.weather_code] || ['Warunki nieznane', '❔'];
        document.getElementById('currentTemp').textContent = `${Math.round(current.temperature_2m)}°`;
        document.getElementById('weatherDesc').textContent = desc;
        document.getElementById('weatherIcon').textContent = icon;
        document.getElementById('feelsLike').textContent = `Odczuwalna: ${Math.round(current.apparent_temperature)}°`;
        renderHourly(data.hourly.time, data.hourly.temperature_2m, data.hourly.weather_code, data.hourly.precipitation_probability);
        document.getElementById('updatedAt').textContent = 'Aktualizacja: ' + new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
      } catch (err) {
        document.getElementById('hourlyContainer').innerHTML = '<div style="padding:18px;color:#ffb4b4;">Brak danych pogodowych. Sprawdź internet albo odśwież stronę.</div>';
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
    loadWeather();
    setInterval(loadWeather, 30 * 60 * 1000);
  </script>
</body>
</html>
